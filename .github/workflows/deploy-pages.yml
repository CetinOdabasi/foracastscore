# Static HTML → GitHub Pages (Actions artifact + deploy-pages).
# configure-pages kaldırıldı: o adım, repoda Pages kaydı yokken API'de 404 üretebiliyor.
# Statik site için gerekli değil (SSG env ayarı için kullanılıyordu).
#
# Gerekli (bir kez): Settings → Pages → Source: "GitHub Actions" → Save.
# Sonra bu workflow çalışır; yine hata alırsan önce bu ayarı doğrula.

name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
